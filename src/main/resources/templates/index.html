<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Devops Notes App</title>

    <style>

        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        input, textarea {
            width: 300px;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        .note {
            background-color: white;
            border: 1px solid #ccc;
            padding: 15px;
            margin-top: 20px;
            width: 320px;
        }

        a {
            color: red;
            text-decoration: none;
        }

    </style>

</head>

<body>

<h1>Dev Notes Application</h1>

<form action="/add" method="post">

    <input type="text"
           name="title"
           placeholder="Enter Title"
           required>

    <br>

    <textarea name="content"
              placeholder="Enter Note"
              required></textarea>

    <br>

    <button type="submit">
        Add Note
    </button>

</form>

<div th:each="note : ${notes}" class="note">

    <h3 th:text="${note.title}"></h3>

    <p th:text="${note.content}"></p>

    <a th:href="@{/delete/{id}(id=${note.id})}">
        Delete
    </a>

</div>

</body>
</html>
